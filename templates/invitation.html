{% extends "base.html" %}

{% block content %}
<div style="text-align: center; margin-top: 40px;">
    <h1 style="font-size: 1.5rem; margin-bottom: 30px;">INVITATION OFFICIELLE</h1>
    
    <div class="glass-card" style="padding: 40px 20px;">
        <h2 style="color: var(--primary-color); margin-bottom: 10px;">{{ guest.nom }}</h2>
        <p style="opacity: 0.7; margin-bottom: 30px;">Présentez ce QR Code à l'entrée de la fête.</p>
        
        <div style="background: white; padding: 15px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <img src="{{ url_for('generate_qr', code_unique=guest.code_unique) }}" alt="QR Code" style="width: 250px; height: 250px; display: block;">
        </div>
        
        <div style="margin-top: 40px;">
            <p style="font-weight: 800; font-size: 1.2rem; color: var(--primary-color);">BIRTHDAY PARTY</p>
            <p style="font-size: 0.9rem; opacity: 0.5;">Pakas - 2026</p>
        </div>
    </div>
    
    <p style="font-size: 0.8rem; opacity: 0.4; margin-top: 50px;">Lien unique et personnel</p>
</div>

<!-- On retire la barre de navigation sur cette page pour que ce soit plus "pro" -->
<style>
.floating-nav { display: none; }
</style>
{% endblock %}
